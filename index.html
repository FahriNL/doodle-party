<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodle Party - PC Screen</title>
    <meta name="description" content="Doodle Party — A real-time multiplayer drawing game. Your PC is the big screen, your phone is the canvas!">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <!-- Animated background blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <!-- Lobby Screen -->
    <div id="lobby-screen" class="screen">
        <h1 class="logo-font" style="font-size: 3.5rem; margin-bottom: 0.5rem;">Doodle Party</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem;">Your phone is the brush. This screen is the canvas.</p>
        
        <div class="glass lobby-info">
            <p style="font-size: 1.1rem; font-weight: 600;">📱 Scan to join the fun!</p>
            <div id="qrcode" class="qr-container"></div>
            <p id="room-code" class="room-code"></p>
            <p id="connection-status" style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem;">⏳ Connecting...</p>
            
            <div id="player-count" style="margin-top: 1rem; font-size: 1rem;">
                <span style="color: var(--text-muted);">Waiting for players... (0)</span>
            </div>

            <div class="lobby-controls">
                <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <label style="font-size: 0.9rem;">⏱ Battle Time:</label>
                    <select id="battle-time-select" class="select-field">
                        <option value="180">3 Minutes</option>
                        <option value="240">4 Minutes</option>
                        <option value="300">5 Minutes</option>
                        <option value="360" selected>6 Minutes</option>
                    </select>
                </div>
                <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
                    <button onclick="startGame('freeplay')" class="btn-mode btn-freeplay" id="btn-freeplay">🎨 Freeplay Mode</button>
                    <button onclick="startGame('battle')" class="btn-mode btn-battle" id="btn-battle">⚔️ Battle Mode</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen hidden">
        <div class="players-badge glass">
            <div id="active-players">Players: 0</div>
            <div id="game-timer" class="game-timer"></div>
        </div>
        
        <div id="battle-header" class="battle-header hidden">
            <h2 id="battle-theme" class="battle-theme-text">🎨 Theme: Loading...</h2>
        </div>

        <div id="host-canvas-container">
            <canvas id="host-canvas"></canvas>
        </div>
    </div>

    <!-- Reveal Screen -->
    <div id="reveal-screen" class="screen hidden">
        <h2 id="reveal-title" class="reveal-title">Who drew this?</h2>
        <small id="reveal-counter" style="color: var(--text-muted); margin-bottom: 1rem;">1 / 1</small>
        <div id="reveal-container">
            <img id="reveal-image" src="" alt="Doodle">
        </div>
        <div id="voting-status" class="glass" style="margin-top: 2rem; font-size: 1.1rem;">
            Waiting for votes... (0/0)
        </div>
    </div>

    <!-- Winner Screen -->
    <div id="winner-screen" class="screen hidden">
        <h1 class="winner-title">🏆 Final Results</h1>
        <div id="winner-display" class="glass leaderboard">
            <!-- Leaderboard rows injected here -->
        </div>
        <button onclick="location.reload()" class="btn-primary" style="margin-top: 2rem;">🔄 Play Again</button>
    </div>

    <script src="js/drawing.js"></script>
    <script src="js/host.js"></script>
</body>
</html>
